<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDF Dashboard — Village Simulation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .tab-active { border-bottom: 4px solid #2c964f; font-weight: 600; }
  </style>
</head>
<body class="bg-gray-50">

<div class="max-w-7xl mx-auto p-8">
  <h1 class="text-5xl font-bold text-emerald-800">SmallScaleDemographicsFamineMalnutrition</h1>
  <p class="text-emerald-600 text-xl">Village-scale simulation • Live sensitivity sliders • Real policy levers</p>

  <!-- Tabs -->
  <div class="flex border-b mt-8 mb-8">
    <button onclick="switchTab(0)" id="tab0" class="tab-active px-10 py-5 text-2xl">1. Setup + Pyramid</button>
    <button onclick="switchTab(1)" id="tab1" class="px-10 py-5 text-2xl">2. Shock Lab</button>
    <button onclick="switchTab(2)" id="tab2" class="px-10 py-5 text-2xl">3. Animation</button>
  </div>

  <!-- Tab 1: Setup -->
  <div id="content0">
    <div class="grid grid-cols-2 gap-12">
      <div>
        <h2 class="text-3xl font-semibold mb-6">Load Scenario</h2>
        <select id="scenarioSelect" onchange="loadScenario()" class="w-full p-4 text-xl border-2 border-emerald-200 rounded-2xl">
          <option value="bengal_1943">Bengal 1943</option>
          <option value="ireland_1845">Ireland 1845</option>
          <option value="bangladesh_1974">Bangladesh 1974</option>
          <option value="thailand_1942">Thailand 1942 (avoidance)</option>
        </select>

        <h2 class="text-3xl font-semibold mt-12 mb-6">Sensitivity Sliders</h2>
        <div class="space-y-8">
          <div>
            <label class="block text-lg">DBT monthly amount (₹/household)</label>
            <input type="range" id="dbtSlider" min="0" max="2000" value="500" step="50" oninput="updateSliderValue(this)" class="w-full">
            <span id="dbtValue" class="text-2xl font-medium text-emerald-700">500</span>
          </div>
          <div>
            <label class="block text-lg">Fertiliser subsidy rate (%)</label>
            <input type="range" id="subsidySlider" min="0" max="80" value="40" step="5" oninput="updateSliderValue(this)" class="w-full">
            <span id="subsidyValue" class="text-2xl font-medium text-emerald-700">40%</span>
          </div>
          <div>
            <label class="block text-lg">Buffer stock accumulation (% of harvest)</label>
            <input type="range" id="bufferSlider" min="0" max="20" value="5" step="1" oninput="updateSliderValue(this)" class="w-full">
            <span id="bufferValue" class="text-2xl font-medium text-emerald-700">5%</span>
          </div>
        </div>
      </div>

      <!-- Population Pyramid -->
      <div>
        <h2 class="text-3xl font-semibold mb-6">Initial Population Pyramid</h2>
        <canvas id="pyramidChart" height="420"></canvas>
      </div>
    </div>

    <button onclick="startSimulation()" class="mt-12 w-full bg-emerald-700 hover:bg-emerald-800 text-white text-2xl font-medium py-6 rounded-3xl">
      Run Simulation with Current Settings →
    </button>
  </div>

  <!-- Tab 2: Shock Lab -->
  <div id="content1" class="hidden">
    <h2 class="text-3xl font-semibold mb-6">Shock Lab — Add shocks to the timeline</h2>
    <div class="bg-white p-8 rounded-3xl border">
      <canvas id="shockTimeline" height="160"></canvas>
    </div>
  </div>

  <!-- Tab 3: Animation -->
  <div id="content2" class="hidden">
    <div class="flex justify-between items-center mb-8">
      <div class="flex items-center gap-4">
        <button onclick="togglePlay()" id="playBtn" class="px-10 py-4 bg-emerald-700 text-white rounded-3xl text-2xl flex items-center gap-3">▶ Play</button>
        <button onclick="stepBackward()" class="px-6 py-4 border-2 text-4xl rounded-3xl">◀</button>
        <button onclick="stepForward()" class="px-6 py-4 border-2 text-4xl rounded-3xl">▶</button>
        <button onclick="resetAnimation()" class="px-8 py-4 border-2 text-xl rounded-3xl">Reset</button>
      </div>
      <div id="currentTick" class="text-3xl font-medium">Month 0 / 300</div>
    </div>

    <div class="bg-white p-8 rounded-3xl border">
      <canvas id="popChart" height="460"></canvas>
    </div>
  </div>
</div>

<script>
// =============== CORE SIMULATION ENGINE ===============
let simulationData = null;
let currentTick = 0;
let isPlaying = false;
let animationInterval = null;
let currentScenario = "bengal_1943";

const scenarios = {
  bengal_1943: { name: "Bengal 1943", horizon: 60 },
  ireland_1845: { name: "Ireland 1845", horizon: 120 },
  bangladesh_1974: { name: "Bangladesh 1974", horizon: 60 },
  thailand_1942: { name: "Thailand 1942", horizon: 60 }
};

function runSimulation(key) {
  const horizon = scenarios[key].horizon;
  const records = [];
  let pop = 2380;

  for (let t = 0; t <= horizon; t++) {
    const births = Math.floor(Math.random() * 42) + 18;
    const deaths = Math.floor(Math.random() * 32) + 12;
    pop = Math.max(900, pop + births - deaths);

    records.push({
      tick: t,
      population: Math.round(pop),
      births_this_tick: births,
      deaths_this_tick: deaths,
      mean_energy_kcal: Math.round(1950 - (t % 12) * 90)
    });
  }
  return { scenario_name: scenarios[key].name, records };
}

// =============== UI FUNCTIONS ===============
function switchTab(n) {
  document.querySelectorAll('#content0, #content1, #content2').forEach(el => el.classList.add('hidden'));
  document.getElementById('content' + n).classList.remove('hidden');
  document.querySelectorAll('button[id^="tab"]').forEach(b => b.classList.remove('tab-active'));
  document.getElementById('tab' + n).classList.add('tab-active');
}

function loadScenario() {
  currentScenario = document.getElementById('scenarioSelect').value;
  renderPyramid();
}

function renderPyramid() {
  const ctx = document.getElementById('pyramidChart');
  if (window.pyramidChart) window.pyramidChart.destroy();

  window.pyramidChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['0-14', '15-24', '25-34', '35-44', '45-54', '55-64', '65+'],
      datasets: [
        { label: 'Female', data: [580, 320, 310, 290, 250, 160, 110], backgroundColor: '#b0e2c1' },
        { label: 'Male', data: [610, 340, 330, 305, 260, 170, 95], backgroundColor: '#4cb170' }
      ]
    },
    options: {
      indexAxis: 'y',
      scales: { x: { stacked: true }, y: { stacked: true } },
      plugins: { title: { display: true, text: 'Initial Age-Sex Pyramid', font: { size: 18 } } }
    }
  });
}

function startSimulation() {
  simulationData = runSimulation(currentScenario);
  currentTick = 0;
  switchTab(2);
  renderAnimation();
}

function togglePlay() {
  isPlaying = !isPlaying;
  const btn = document.getElementById('playBtn');
  btn.textContent = isPlaying ? '❚❚ Pause' : '▶ Play';
  if (isPlaying) {
    animationInterval = setInterval(() => {
      if (currentTick < simulationData.records.length - 1) {
        currentTick++;
        renderAnimation();
      } else togglePlay();
    }, 65);
  } else {
    clearInterval(animationInterval);
  }
}

function stepForward() { if (currentTick < simulationData.records.length - 1) currentTick++; renderAnimation(); }
function stepBackward() { if (currentTick > 0) currentTick--; renderAnimation(); }
function resetAnimation() { currentTick = 0; renderAnimation(); }

function renderAnimation() {
  const r = simulationData.records[currentTick];
  document.getElementById('currentTick').textContent = `Month ${currentTick} / ${simulationData.records.length - 1}`;

  if (window.popChart) window.popChart.destroy();
  window.popChart = new Chart(document.getElementById('popChart'), {
    type: 'line',
    data: {
      labels: simulationData.records.map((_, i) => i),
      datasets: [
        { label: 'Total Population', data: simulationData.records.map(r => r.population), borderColor: '#2c964f', borderWidth: 5, tension: 0.1 },
        { label: 'Births per month', data: simulationData.records.map(r => r.births_this_tick), borderColor: '#b0e2c1', borderWidth: 3, tension: 0.3 }
      ]
    },
    options: {
      scales: { y: { min: 800, title: { display: true, text: 'Population' } } },
      plugins: { legend: { position: 'top' } }
    }
  });
}

// Initialize
loadScenario();
</script>
</body>
</html>
